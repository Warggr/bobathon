<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Calendar & Tasks Integration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4285f4 0%, #34a853 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4285f4 0%, #34a853 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .auth-section {
            text-align: center;
            padding: 40px 20px;
        }

        .user-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .user-info.active {
            display: block;
        }

        .user-info h3 {
            color: #4285f4;
            margin-bottom: 10px;
        }

        button {
            background: linear-gradient(135deg, #4285f4 0%, #34a853 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 5px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(66, 133, 244, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .data-section {
            margin-top: 30px;
            display: none;
        }

        .data-section.active {
            display: block;
        }

        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .data-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            border-left: 4px solid #4285f4;
        }

        .data-card h3 {
            color: #4285f4;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .event-item, .task-item {
            background: white;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .event-item h4, .task-item h4 {
            color: #333;
            margin-bottom: 8px;
        }

        .event-time, .task-meta {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .event-location {
            color: #888;
            font-size: 0.85em;
        }

        .task-list-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            background: #e8f0fe;
            color: #4285f4;
            margin-left: 10px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #4285f4;
        }

        .loading::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        .error {
            background: #ea4335;
            color: white;
            padding: 15px;
            border-radius: 6px;
            margin: 20px 0;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #4285f4;
        }

        .stat-label {
            color: #666;
            margin-top: 5px;
        }

        .calendar-selector {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .calendar-selector.active {
            display: block;
        }

        .calendar-selector h4 {
            color: #4285f4;
            margin-bottom: 10px;
        }

        .calendar-checkbox {
            display: block;
            padding: 8px;
            margin: 5px 0;
        }

        .calendar-checkbox input {
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📅 Google Calendar & Tasks</h1>
            <p>Connect to your Google account to view calendar events and tasks</p>
        </div>

        <div class="content">
            <div class="auth-section" id="authSection">
                <button id="signInBtn" onclick="signIn()">Sign In with Google</button>
            </div>

            <div class="user-info" id="userInfo">
                <h3>👤 Signed in as: <span id="userName"></span></h3>
                <p>Email: <span id="userEmail"></span></p>
                <button onclick="signOut()">Sign Out</button>
                <button onclick="loadData()">Refresh Data</button>
                <button onclick="toggleCalendarSelector()">Select Calendars</button>
            </div>

            <div class="calendar-selector" id="calendarSelector">
                <h4>Select Calendars to Display</h4>
                <div id="calendarList"></div>
                <button onclick="loadSelectedCalendars()">Load Selected Calendars</button>
            </div>

            <div id="errorMessage"></div>

            <div class="data-section" id="dataSection">
                <div class="stats" id="stats"></div>

                <div class="data-grid">
                    <div class="data-card">
                        <h3>📅 Calendar Events (Next 7 Days)</h3>
                        <div id="eventsContainer">
                            <div class="loading">Loading events</div>
                        </div>
                    </div>

                    <div class="data-card">
                        <h3>✅ Tasks</h3>
                        <div id="tasksContainer">
                            <div class="loading">Loading tasks</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Google API libraries -->
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
    
    <!-- Google Calendar Client -->
    <script src="google-calendar-client.js"></script>

    <script>
        // Configuration - These values should come from your .env file
        // In a production environment, you would load these from a secure backend
        const config = {
            clientId: 'YOUR_CLIENT_ID.apps.googleusercontent.com', // Replace with your Google Client ID
            apiKey: 'YOUR_API_KEY' // Replace with your Google API Key
        };

        let googleClient;
        let selectedCalendarIds = ['primary'];

        // Initialize the application
        async function initializeApp() {
            try {
                googleClient = new GoogleCalendarClient(config);
                await googleClient.initialize();
                
                if (googleClient.getIsSignedIn()) {
                    await onSignedIn();
                }
            } catch (error) {
                showError('Initialization error: ' + error.message);
            }
        }

        // Sign in
        async function signIn() {
            try {
                document.getElementById('signInBtn').disabled = true;
                await googleClient.signIn();
                await onSignedIn();
            } catch (error) {
                showError('Sign in error: ' + error.message);
                document.getElementById('signInBtn').disabled = false;
            }
        }

        // Sign out
        function signOut() {
            try {
                googleClient.signOut();
                document.getElementById('authSection').style.display = 'block';
                document.getElementById('userInfo').classList.remove('active');
                document.getElementById('dataSection').classList.remove('active');
                document.getElementById('calendarSelector').classList.remove('active');
                document.getElementById('signInBtn').disabled = false;
            } catch (error) {
                showError('Sign out error: ' + error.message);
            }
        }

        // Handle successful sign in
        async function onSignedIn() {
            try {
                const profile = await googleClient.getUserProfile();
                
                document.getElementById('userName').textContent = profile.name;
                document.getElementById('userEmail').textContent = profile.email;
                
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('userInfo').classList.add('active');
                document.getElementById('dataSection').classList.add('active');
                
                // Load available calendars
                await loadCalendarList();
                
                await loadData();
            } catch (error) {
                showError('Error loading profile: ' + error.message);
            }
        }

        // Load list of available calendars
        async function loadCalendarList() {
            try {
                const calendars = await googleClient.getCalendars();
                const calendarListDiv = document.getElementById('calendarList');
                
                calendarListDiv.innerHTML = calendars.map(cal => `
                    <label class="calendar-checkbox">
                        <input type="checkbox" 
                               value="${cal.id}" 
                               ${cal.id === 'primary' ? 'checked' : ''}
                               onchange="updateSelectedCalendars()">
                        <span style="color: ${cal.backgroundColor || '#4285f4'}">●</span>
                        ${cal.summary}
                    </label>
                `).join('');
            } catch (error) {
                console.error('Error loading calendar list:', error);
            }
        }

        // Toggle calendar selector visibility
        function toggleCalendarSelector() {
            const selector = document.getElementById('calendarSelector');
            selector.classList.toggle('active');
        }

        // Update selected calendars array
        function updateSelectedCalendars() {
            const checkboxes = document.querySelectorAll('.calendar-checkbox input:checked');
            selectedCalendarIds = Array.from(checkboxes).map(cb => cb.value);
        }

        // Load events from selected calendars
        async function loadSelectedCalendars() {
            updateSelectedCalendars();
            await loadData();
            document.getElementById('calendarSelector').classList.remove('active');
        }

        // Load calendar and tasks data
        async function loadData() {
            try {
                clearError();
                
                // Show loading state
                document.getElementById('eventsContainer').innerHTML = '<div class="loading">Loading events</div>';
                document.getElementById('tasksContainer').innerHTML = '<div class="loading">Loading tasks</div>';
                
                // Fetch events from selected calendars
                const events = await googleClient.getEventsFromMultipleCalendars(selectedCalendarIds, new Date(), 7);
                
                // Fetch tasks
                const tasks = await googleClient.getAllTasks(new Date(), 7);
                
                const data = {
                    events,
                    tasks,
                    startDate: new Date(),
                    endDate: new Date(new Date().setDate(new Date().getDate() + 7))
                };
                
                // Display statistics
                displayStats(data);
                
                // Display events
                displayEvents(data.events);
                
                // Display tasks
                displayTasks(data.tasks);
                
            } catch (error) {
                showError('Error loading data: ' + error.message);
            }
        }

        // Display statistics
        function displayStats(data) {
            const statsHtml = `
                <div class="stat-item">
                    <div class="stat-number">${data.events.length}</div>
                    <div class="stat-label">Calendar Events</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">${data.tasks.length}</div>
                    <div class="stat-label">Pending Tasks</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">${Math.round(data.tasks.reduce((sum, t) => sum + t.time, 0) / 60)}h</div>
                    <div class="stat-label">Estimated Time</div>
                </div>
            `;
            document.getElementById('stats').innerHTML = statsHtml;
        }

        // Display calendar events
        function displayEvents(events) {
            const container = document.getElementById('eventsContainer');
            
            if (events.length === 0) {
                container.innerHTML = '<p style="color: #666; text-align: center; padding: 20px;">No events found for the next 7 days</p>';
                return;
            }
            
            const eventsHtml = events.map(event => {
                const startDate = new Date(event.start);
                const endDate = new Date(event.end);
                const dateStr = startDate.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
                const timeStr = event.isAllDay ? 'All Day' : 
                    `${startDate.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })} - ${endDate.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })}`;
                
                return `
                    <div class="event-item">
                        <h4>${event.summary}</h4>
                        <div class="event-time">📅 ${dateStr} • ${timeStr}</div>
                        ${event.location ? `<div class="event-location">📍 ${event.location}</div>` : ''}
                        ${event.description ? `<div style="margin-top: 8px; color: #666; font-size: 0.9em;">${event.description}</div>` : ''}
                    </div>
                `;
            }).join('');
            
            container.innerHTML = eventsHtml;
        }

        // Display tasks
        function displayTasks(tasks) {
            const container = document.getElementById('tasksContainer');
            
            if (tasks.length === 0) {
                container.innerHTML = '<p style="color: #666; text-align: center; padding: 20px;">No pending tasks found</p>';
                return;
            }
            
            const tasksHtml = tasks.map(task => {
                const deadlineStr = task.deadline ? 
                    `⏰ Due: ${new Date(task.deadline).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}` : '';
                
                return `
                    <div class="task-item">
                        <h4>
                            ${task.name}
                            <span class="task-list-badge">${task.listName}</span>
                        </h4>
                        <div class="task-meta">
                            ⏱️ ${task.time} min
                            ${deadlineStr ? ` • ${deadlineStr}` : ''}
                        </div>
                        ${task.description ? `<div style="margin-top: 8px; color: #666; font-size: 0.9em;">${task.description}</div>` : ''}
                    </div>
                `;
            }).join('');
            
            container.innerHTML = tasksHtml;
        }

        // Show error message
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.innerHTML = `<div class="error">❌ ${message}</div>`;
        }

        // Clear error message
        function clearError() {
            document.getElementById('errorMessage').innerHTML = '';
        }

        // Initialize when page loads
        window.addEventListener('DOMContentLoaded', initializeApp);
    </script>
</body>
</html>
